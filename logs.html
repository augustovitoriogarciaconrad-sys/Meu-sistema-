<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs do Sistema</title>
    <link rel="stylesheet" href="css/style.css">

<style>
/* Estilo do popup */
.popup-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #00000088;
    display: none;
    justify-content: center;
    align-items: center;
}
.popup {
    background: white;
    padding: 20px;
    width: 400px;
    border-radius: 10px;
}
.popup h3 { margin-top: 0; }

/* Cores por tipo de ação */
.log-criou { color: green; font-weight: bold; }
.log-editou { color: blue; font-weight: bold; }
.log-excluiu { color: red; font-weight: bold; }
.log-outros { color: gray; font-weight: bold; }

/* Paginação */
.paginacao button {
    margin: 5px;
    padding: 5px 10px;
}

/* Cards */
.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #ddd;
    width: 200px;
    display: inline-block;
    margin: 10px;
    vertical-align: top;
}
.card h3 { margin: 0; font-size: 16px; }
.card p { font-size: 22px; margin: 5px 0 0 0; font-weight: bold; }

/* Gráficos */
.grafico {
    width: 100%;
    height: 260px;
    background: #f5f5f5;
    border-radius: 10px;
    margin-top: 20px;
    position: relative;
}
.barra {
    position: absolute;
    bottom: 0;
    width: 30px;
    background: #4a90e2;
    border-radius: 5px 5px 0 0;
}
</style>

</head>
<body>

<div class="sidebar">

    <div class="item" onclick="location.href='producao.html'"><img class="icon" src="icons/box.svg"><span>Produção</span></div>
    <div class="item" onclick="location.href='estoque_produtos.html'"><img class="icon" src="icons/warehouse.svg"><span>Estoque</span></div>
    <div class="item" onclick="location.href='produtos.html'"><img class="icon" src="icons/tag.svg"><span>Produtos</span></div>
    <div class="item" onclick="location.href='insumos.html'"><img class="icon" src="icons/layers.svg"><span>Insumos</span></div>
    <div class="item" onclick="location.href='relatorios.html'"><img class="icon" src="icons/chart.svg"><span>Relatórios</span></div>
    <div class="item active" onclick="location.href='logs.html'"><img class="icon" src="icons/list.svg"><span>Logs</span></div>
    <div class="item" onclick="location.href='admin.html'"><img class="icon" src="icons/settings.svg"><span>Administração</span></div>

<div class="main">
<header>
    <h2>Logs do Sistema</h2>
</header>
<!-- ALERTAS -->
<div id="alertas" class="card" style="width:95%; background:#fff3cd; border-color:#ffeeba;">
    <h3>Alertas do Sistema</h3>
    <ul id="listaAlertas"></ul>
</div>

<!-- ESTATÍSTICAS DE ESTOQUE -->
<h3>Estatísticas de Estoque</h3>

<!-- GRÁFICO DE LINHA -->

<div class="grafico" id="graficoLinha"></div>

<!-- GRÁFICO DE PIZZA -->

<canvas id="pizza" width="300" height="150" style="background:#f5f5f5; border-radius:10px;"></canvas>


<!-- FILTROS -->
<h3>Logs Detalhados</h3>
<div class="filtros">

    <label>Usuário</label>
    <select id="filtroUsuario">
        <option value="">Todos</option>
    </select>

    <label>Ação</label>
    <select id="filtroAcao">
        <option value="">Todas</option>
    </select>

    <label>Buscar texto</label>
    <input id="filtroTexto" placeholder="Ex: editou, criou, produto...">

    <label>Data inicial</label>
    <input type="date" id="dataInicio">

    <input type="date" id="dataFim">

</div>

<p id="contador"></p>

<table>
<thead>
<tr>
    <th onclick="ordenar('data')">Data</th>
    <th onclick="ordenar('usuario')">Usuário</th>
    <th onclick="ordenar('acao')">Ação</th>
    <th>Detalhes</th>
</tr>
</thead>
<tbody id="listaLogs"></tbody>
</table>

<div class="paginacao" id="paginacao"></div>

</div>

<!-- POPUP -->
<div class="popup-bg" id="popupBg">
    <div class="popup">
        <h3>Detalhes do Log</h3>
        <p id="popupConteudo"></p>
        <button onclick="fecharPopup()">Fechar</button>
    </div>
</div>

<script src="js/app.js"></script>

<script>
/* ============================
   🔐 SOMENTE ADMIN
============================ */
const user = usuarioLogado();
if (!user || user.permissao !== "admin") {
    alert("Apenas administradores podem acessar esta página.");
    location.href = "inicio.html";
}

let logs = listar("logs");
let logsFiltrados = [...logs];
let paginaAtual = 1;
const porPagina = 15;

/* ============================
   🔥 ALERTAS INTELIGENTES
============================ */
function gerarAlertas() {
    const alertas = [];
    const produtos = listar("produtos");

    const ruptura = produtos.filter(p => p.estoqueAtual === 0);
    const abaixoMin = produtos.filter(p => p.estoqueAtual < p.estoqueMinimo);
    const critico = produtos.filter(p =>
        p.estoqueAtual > 0 &&
        p.estoqueAtual <= p.estoqueMinimo * 1.2
    );

    if (ruptura.length > 0)
        alertas.push(`⚠️ ${ruptura.length} produto(s) em RUPTURA TOTAL.`);

    if (abaixoMin.length > 0)
        alertas.push(`⚠️ ${abaixoMin.length} produto(s) abaixo do estoque mínimo.`);

    if (critico.length > 0)
        alertas.push(`⚠️ ${critico.length} produto(s) com estoque crítico.`);

    const hoje = new Date().toLocaleDateString("pt-BR");
    const logsHoje = logs.filter(l => l.data.startsWith(hoje));

    if (logsHoje.length > 50)
        alertas.push(`⚠️ Atividade incomum detectada: ${logsHoje.length} ações hoje.`);

    const edicoesHoje = logsHoje.filter(l => l.acao.includes("editado")).length;
    if (edicoesHoje > 20)
        alertas.push(`⚠️ Muitas edições hoje (${edicoesHoje}). Verifique possíveis erros.`);

    const ul = document.getElementById("listaAlertas");
    ul.innerHTML = "";

    if (alertas.length === 0) {
        ul.innerHTML = "<li>Nenhum alerta no momento.</li>";
        return;
    }

    alertas.forEach(a => ul.innerHTML += `<li>${a}</li>`);
}

/* ============================
   📦 ESTATÍSTICAS DE ESTOQUE
============================ */
function gerarEstatisticasEstoque() {
    const produtos = listar("produtos");

    const ruptura = produtos.filter(p => p.estoqueAtual === 0).length;
    const abaixo = produtos.filter(p => p.estoqueAtual < p.estoqueMinimo).length;
    const critico = produtos.filter(p =>
        p.estoqueAtual > 0 &&
        p.estoqueAtual <= p.estoqueMinimo * 1.2
    ).length;
    const saudavel = produtos.filter(p => p.estoqueAtual > p.estoqueMinimo * 1.2).length;

    document.getElementById("cardsEstoque").innerHTML = `
        <div class="card"><h3>Ruptura</h3><p>${ruptura}</p></div>
        <div class="card"><h3>Abaixo do mínimo</h3><p>${abaixo}</p></div>
        <div class="card"><h3>Crítico</h3><p>${critico}</p></div>
        <div class="card"><h3>Saudável</h3><p>${saudavel}</p></div>
    `;
}

/* ============================
   📈 GRÁFICO DE LINHA (14 dias)
============================ */
function gerarGraficoLinha() {
    const grafico = document.getElementById("graficoLinha");
    grafico.innerHTML = "";

    const dias = [];
    const valores = [];

    for (let i = 13; i >= 0; i--) {
        const dia = new Date();
        dia.setDate(dia.getDate() - i);
        const diaStr = dia.toLocaleDateString("pt-BR");

        dias.push(diaStr);
        valores.push(logs.filter(l => l.data.startsWith(diaStr)).length);
    }

    let maxValor = Math.max(...valores);
    if (maxValor === 0) maxValor = 1;

    for (let i = 0; i < dias.length; i++) {
        const ponto = document.createElement("div");
        ponto.style.position = "absolute";
        ponto.style.width = "8px";
        ponto.style.height = "8px";
        ponto.style.background = "#e67e22";
        ponto.style.borderRadius = "50%";

        const x = i * 40 + 20;
        const y = 250 - (valores[i] / maxValor) * 200;

        ponto.style.left = x + "px";
        ponto.style.top = y + "px";

        grafico.appendChild(ponto);

        if (i > 0) {
            const linha = document.createElement("div");
            linha.style.position = "absolute";
            linha.style.height = "2px";
            linha.style.background = "#e67e22";

            const x1 = (i - 1) * 40 + 20;
            const y1 = 250 - (valores[i - 1] / maxValor) * 200;

            const largura = Math.sqrt((x - x1) ** 2 + (y - y1) ** 2);
            linha.style.width = largura + "px";

            const angulo = Math.atan2(y - y1, x - x1) * 180 / Math.PI;
            linha.style.transform = `rotate(${angulo}deg)`;
            linha.style.left = x1 + "px";
            linha.style.top = y1 + "px";

            grafico.appendChild(linha);
        }
    }
}

/* ============================
   🥧 GRÁFICO DE PIZZA
============================ */
function gerarGraficoPizza() {
    const canvas = document.getElementById("pizza");
    const ctx = canvas.getContext("2d");

    const criados = logs.filter(l => l.acao.includes("criado")).length;
    const editados = logs.filter(l => l.acao.includes("editado")).length;
    const excluidos = logs.filter(l => l.acao.includes("excluído")).length;
    const logins = logs.filter(l => l.acao.toLowerCase().includes("login")).length;

    const dados = [criados, editados, excluidos, logins];
    const cores = ["#2ecc71", "#3498db", "#e74c3c", "#9b59b6"];

    const total = dados.reduce((a, b) => a + b, 0);
    let inicio = 0;

    for (let i = 0; i < dados.length; i++) {
        const angulo = (dados[i] / total) * 2 * Math.PI;

        ctx.beginPath();
        ctx.moveTo(150, 75);
        ctx.arc(150, 75, 70, inicio, inicio + angulo);
        ctx.fillStyle = cores[i];
        ctx.fill();

        inicio += angulo;
    }
}

/* ============================
   📋 LISTAGEM DE LOGS
============================ */
function carregarFiltros() {
    const usuarios = [...new Set(logs.map(l => l.usuario))];
    const acoes = [...new Set(logs.map(l => l.acao))];

    usuarios.forEach(u => {
        filtroUsuario.innerHTML += `<option value="${u}">${u}</option>`;
    });

    acoes.forEach(a => {
        filtroAcao.innerHTML += `<option value="${a}">${a}</option>`;
    });
}

function listarLogs() {
    const tabela = document.getElementById("listaLogs");
    tabela.innerHTML = "";

    const inicio = (paginaAtual - 1) * porPagina;
    const fim = inicio + porPagina;

    const pagina = logsFiltrados.slice(inicio, fim);

    pagina.forEach(log => {
        const classe =
            log.acao.toLowerCase().includes("criado") ? "log-criou" :
            log.acao.toLowerCase().includes("editado") ? "log-editou" :
            log.acao.toLowerCase().includes("excluído") ? "log-excluiu" :
            "log-outros";

        tabela.innerHTML += `
        <tr>
            <td>${log.data}</td>
            <td>${log.usuario}</td>
            <td class="${classe}">${log.acao}</td>
            <td><button onclick='verDetalhes(${JSON.stringify(log.detalhes)})'>Ver detalhes</button></td>
        </tr>`;
    });

    atualizarPaginacao();
    contador.innerText = `Mostrando ${logsFiltrados.length} registros`;
}

function verDetalhes(texto) {
    popupConteudo.innerText = texto;
    popupBg.style.display = "flex";
}
function fecharPopup() {
    popupBg.style.display = "none";
}

function atualizarPaginacao() {
    const totalPaginas = Math.ceil(logsFiltrados.length / porPagina);
    const pag = document.getElementById("paginacao");
    pag.innerHTML = "";

    for (let i = 1; i <= totalPaginas; i++) {
        pag.innerHTML += `<button onclick="irPara(${i})">${i}</button>`;
    }
}
function irPara(num) {
    paginaAtual = num;
    listarLogs();
}

function aplicarFiltros() {
    logsFiltrados = [...logs];

    const usuario = filtroUsuario.value;
    const acao = filtroAcao.value;
    const texto = filtroTexto.value.toLowerCase();
    const inicio = dataInicio.value;
    const fim = dataFim.value;

    if (usuario) logsFiltrados = logsFiltrados.filter(l => l.usuario === usuario);
    if (acao) logsFiltrados = logsFiltrados.filter(l => l.acao === acao);
    if (texto) logsFiltrados = logsFiltrados.filter(l =>
        l.acao.toLowerCase().includes(texto) ||
        l.detalhes.toLowerCase().includes(texto)
    );

    if (inicio) logsFiltrados = logsFiltrados.filter(l => new Date(l.data) >= new Date(inicio));
    if (fim) logsFiltrados = logsFiltrados.filter(l => new Date(l.data) <= new Date(fim + " 23:59"));

    paginaAtual = 1;
    listarLogs();
}

function limparFiltros() {
    filtroUsuario.value = "";
    filtroAcao.value = "";
    filtroTexto.value = "";
    dataInicio.value = "";
    dataFim.value = "";

    logsFiltrados = [...logs];
    listarLogs();
}

function ordenar(campo) {
    logsFiltrados.sort((a, b) => a[campo].localeCompare(b[campo]));
    listarLogs();
}

function exportarCSV() {
    let csv = "data;usuario;acao;detalhes\n";

    logsFiltrados.for
