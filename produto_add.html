<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Produto</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="main">
<h2>Novo Produto</h2>

<label>Nome</label>
<input id="nome">

<label>Categoria</label>
<input id="categoria">

<label>Preço</label>
<input id="preco" type="number" min="0" step="0.01">

<label>Estoque Mínimo</label>
<input id="estoqueMinimo" type="number" min="0">

<button class="btn-primary" onclick="salvarProduto()">Salvar</button>
<button class="btn-secondary" onclick="history.back()">Cancelar</button>

</div>

<script src="js/app.js"></script>
<script>
function salvarProduto() {

    // Validação básica
    if (!nome.value.trim() || !categoria.value.trim() || !preco.value || !estoqueMinimo.value) {
        alert("Preencha todos os campos.");
        return;
    }

    // Impede valores negativos
    if (preco.value < 0 || estoqueMinimo.value < 0) {
        alert("Preço e estoque mínimo não podem ser negativos.");
        return;
    }

    // Cria o produto
    criarProduto(
        nome.value,
        categoria.value,
        Number(preco.value),
        Number(estoqueMinimo.value)
    );

    alert("Produto cadastrado com sucesso!");
    location.href = "produtos.html";
}
</script>

</body>
</html>
