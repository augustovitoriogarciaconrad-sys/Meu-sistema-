<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Usuário</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar">
    <div class="item" onclick="location.href='home.html'"><img class="icon" src="icons/home.svg"><span>Dashboard</span></div>
    <div class="item" onclick="location.href='producao.html'"><img class="icon" src="icons/box.svg"><span>Produção</span></div>
    <div class="item" onclick="location.href='estoque_produtos.html'"><img class="icon" src="icons/warehouse.svg"><span>Estoque</span></div>
    <div class="item" onclick="location.href='produtos.html'"><img class="icon" src="icons/tag.svg"><span>Produtos</span></div>
    <div class="item" onclick="location.href='insumos.html'"><img class="icon" src="icons/layers.svg"><span>Insumos</span></div>
    <div class="item" onclick="location.href='relatorios.html'"><img class="icon" src="icons/chart.svg"><span>Relatórios</span></div>
    <div class="item" onclick="location.href='admin.html'"><img class="icon" src="icons/settings.svg"><span>Administração</span></div>
    <div class="item active" onclick="location.href='perfil.html'"><img class="icon" src="icons/user.svg"><span>Perfil</span></div>
    <div class="item" onclick="logout()"><img class="icon" src="icons/logout.svg"><span>Sair</span></div>
</div>

<div class="main">
<header>
    <h2>Meu Perfil</h2>
</header>

<div style="max-width:500px;margin-top:20px;">
    <label>Nome</label>
    <input id="nome" type="text" disabled>

    <label>E-mail</label>
    <input id="email" type="email" disabled>

    <label>Permissão</label>
    <input id="permissao" type="text" disabled>

    <h3 style="margin-top:30px;">Alterar Senha</h3>

    <label>Senha Atual</label>
    <input id="senhaAtual" type="password">

    <label>Nova Senha</label>
    <input id="senhaNova" type="password">

    <button class="btn-primary" style="margin-top:20px;" onclick="alterarSenha()">Salvar Nova Senha</button>

    <div id="msg"></div>
</div>

</div>

<script src="js/app.js"></script>
<script>
function carregarPerfil() {
    const user = usuarioLogado();
    if (!user) return logout();

    document.getElementById("nome").value = user.nome;
    document.getElementById("email").value = user.email;
    document.getElementById("permissao").value = user.permissao;
}

function alterarSenha() {
    const atual = senhaAtual.value;
    const nova = senhaNova.value;

    const user = usuarioLogado();
    if (!user) return;

    if (atual !== user.senha) {
        msg.innerHTML = "<div class='alert alert-danger'>Senha atual incorreta.</div>";
        return;
    }

    if (nova.length < 4) {
        msg.innerHTML = "<div class='alert alert-warning'>A nova senha deve ter pelo menos 4 caracteres.</div>";
        return;
    }

    user.senha = nova;
    atualizar("usuarios", user.id, user);
    registrarLog("Alterou senha", "Usuário " + user.email);

    msg.innerHTML = "<div class='alert alert-success'>Senha alterada com sucesso!</div>";
    senhaAtual.value = "";
    senhaNova.value = "";
}

carregarPerfil();
</script>

</body>
</html>
