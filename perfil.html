<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Usuário</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar">
    <div class="item" onclick="location.href='inicio.html'"><img class="icon" src="icons/home.svg"><span>Início</span></div>
    <div class="item" id="menuProducao" onclick="location.href='producao.html'"><img class="icon" src="icons/box.svg"><span>Produção</span></div>
    <div class="item" id="menuEstoque" onclick="location.href='estoque_produtos.html'"><img class="icon" src="icons/warehouse.svg"><span>Estoque</span></div>
    <div class="item" id="menuProdutos" onclick="location.href='produtos.html'"><img class="icon" src="icons/tag.svg"><span>Produtos</span></div>
    <div class="item" id="menuInsumos" onclick="location.href='insumos.html'"><img class="icon" src="icons/layers.svg"><span>Insumos</span></div>
    <div class="item" id="menuRelatorios" onclick="location.href='relatorios.html'"><img class="icon" src="icons/chart.svg"><span>Relatórios</span></div>
    <div class="item" id="menuAdmin" onclick="location.href='admin.html'"><img class="icon" src="icons/settings.svg"><span>Administração</span></div>
    <div class="item active" onclick="location.href='perfil.html'"><img class="icon" src="icons/user.svg"><span>Perfil</span></div>
    <div class="item" onclick="logout()"><img class="icon" src="icons/logout.svg"><span>Sair</span></div>
</div>

<div class="main">
<header>
    <h2>Meu Perfil</h2>
</header>

<div style="max-width:500px;margin-top:20px;">
    <label>Nome</label>
    <input id="nome" type="text" disabled>

    <label>E-mail</label>
    <input id="email" type="email" disabled>

    <label>Permissão</label>
    <input id="permissao" type="text" disabled>

    <h3 style="margin-top:30px;">Alterar Senha</h3>

    <label>Senha Atual</label>
    <input id="senhaAtual" type="password">

    <label>Nova Senha</label>
    <input id="senhaNova" type="password">

    <button class="btn-primary" style="margin-top:20px;" onclick="alterarSenha()">Salvar Nova Senha</button>

    <div id="msg"></div>
</div>

</div>

<script src="js/app.js"></script>

<script>
// QUALQUER USUÁRIO LOGADO PODE VER O PRÓPRIO PERFIL
const user = usuarioLogado();
if (!user) {
    alert("Sessão expirada. Faça login novamente.");
    location.href = "index.html";
}

// MENU DINÂMICO
const permitidas = areasPermitidas();

if (!permitidas.includes("producao")) document.getElementById("menuProducao").style.display = "none";
if (!permitidas.includes("estoque")) document.getElementById("menuEstoque").style.display = "none";
if (!permitidas.includes("produtos")) document.getElementById("menuProdutos").style.display = "none";
if (!permitidas.includes("insumos")) document.getElementById("menuInsumos").style.display = "none";
if (!permitidas.includes("relatorios")) document.getElementById("menuRelatorios").style.display = "none";
if (!permitidas.includes("admin")) document.getElementById("menuAdmin").style.display = "none";

// CARREGAR PERFIL
function carregarPerfil() {
    nome.value = user.nome;
    email.value = user.email;
    permissao.value = user.permissao;
}

// ALTERAR SENHA
function alterarSenha() {
    const atual = senhaAtual.value.trim();
    const nova = senhaNova.value.trim();

    if (!atual || !nova) {
        msg.innerHTML = "<div class='alert alert-warning'>Preencha todos os campos.</div>";
        return;
    }

    if (atual !== user.senha) {
        msg.innerHTML = "<div class='alert alert-danger'>Senha atual incorreta.</div>";
        return;
    }

    if (nova.length < 4) {
        msg.innerHTML = "<div class='alert alert-warning'>A nova senha deve ter pelo menos 4 caracteres.</div>";
        return;
    }

    user.senha = nova;
    atualizar("usuarios", user.id, user);
    registrarLog("Alterou senha", "Usuário " + user.email);

    msg.innerHTML = "<div class='alert alert-success'>Senha alterada com sucesso!</div>";
    senhaAtual.value = "";
    senhaNova.value = "";
}

carregarPerfil();
</script>

</body>
</html>
