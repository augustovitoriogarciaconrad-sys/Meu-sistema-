<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Insumo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="main">
<h2>Editar Insumo</h2>

<label>Nome</label>
<input id="nome">

<label>Categoria</label>
<input id="categoria">

<label>Quantidade em estoque</label>
<input id="quantidade" type="number" min="0" step="0.001">

<label>Unidade</label>
<select id="unidade">
    <option value="un">Unidade (un)</option>
    <option value="kg">Quilo (kg)</option>
    <option value="g">Gramas (g)</option>
    <option value="L">Litro (L)</option>
    <option value="ml">Mililitro (ml)</option>
</select>

<label>Validade</label>
<input id="validade" type="date">

<button class="btn-primary" onclick="salvar()">Salvar</button>
<button class="btn-secondary" onclick="history.back()">Cancelar</button>

</div>

<script src="js/app.js"></script>

<script>
// PERMISSÃO — SOMENTE ADMIN E ESTOQUISTA PODEM EDITAR INSUMOS
const user = usuarioLogado();
if (!user || !["admin", "estoquista"].includes(user.permissao)) {
    alert("Acesso não permitido para sua permissão.");
    location.href = "inicio.html";
}

// CARREGAR INSUMO
const id = localStorage.getItem("editInsumo");
const lista = listar("insumos");
const ins = lista.find(x => x.id == id);

if (!ins) {
    alert("Insumo não encontrado.");
    location.href = "insumos.html";
}

// Preenche os campos
nome.value = ins.nome;
categoria.value = ins.categoria;
quantidade.value = ins.estoqueAtual ?? 0;
unidade.value = ins.unidade || "un";
validade.value = ins.validade || "";

// SALVAR ALTERAÇÕES
function salvar() {
    const nomeInsumo = nome.value.trim();
    const categoriaInsumo = categoria.value.trim();
    const qtd = Number(quantidade.value);
    const unidadeInsumo = unidade.value;
    const validadeInsumo = validade.value;

    if (!nomeInsumo || !categoriaInsumo || !validadeInsumo) {
        alert("Preencha todos os campos obrigatórios.");
        return;
    }

    if (isNaN(qtd) || qtd < 0) {
        alert("Informe uma quantidade válida.");
        return;
    }

    // Atualiza dados
    ins.nome = nomeInsumo;
    ins.categoria = categoriaInsumo;
    ins.estoqueAtual = qtd;
    ins.unidade = unidadeInsumo;
    ins.validade = validadeInsumo;

    atualizar("insumos", ins.id, ins);
    registrarLog("Editou insumo", ins.nome);

    // limpa ID salvo
    localStorage.removeItem("editInsumo");

    alert("Insumo atualizado com sucesso!");
    location.href = "insumos.html";
}
</script>

</body>
</html>
