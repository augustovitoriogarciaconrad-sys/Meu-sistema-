<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insumos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar">
    <div class="item" onclick="location.href='inicio.html'"><img class="icon" src="icons/home.svg"><span>Início</span></div>
    <div class="item" id="menuProducao" onclick="location.href='producao.html'"><img class="icon" src="icons/box.svg"><span>Produção</span></div>
    <div class="item" id="menuEstoque" onclick="location.href='estoque_produtos.html'"><img class="icon" src="icons/warehouse.svg"><span>Estoque</span></div>
    <div class="item" id="menuProdutos" onclick="location.href='produtos.html'"><img class="icon" src="icons/tag.svg"><span>Produtos</span></div>
    <div class="item active" id="menuInsumos" onclick="location.href='insumos.html'"><img class="icon" src="icons/layers.svg"><span>Insumos</span></div>
    <div class="item" id="menuRelatorios" onclick="location.href='relatorios.html'"><img class="icon" src="icons/chart.svg"><span>Relatórios</span></div>
    <div class="item" id="menuAdmin" onclick="location.href='admin.html'"><img class="icon" src="icons/settings.svg"><span>Administração</span></div>
    <div class="item" onclick="location.href='perfil.html'"><img class="icon" src="icons/user.svg"><span>Perfil</span></div>
    <div class="item" onclick="logout()"><img class="icon" src="icons/logout.svg"><span>Sair</span></div>
</div>

<div class="main">
<header>
    <h2>Insumos</h2>
    <button class="btn-primary" id="btnAdd" onclick="location.href='insumo_add.html'">+ Adicionar Insumo</button>
</header>

<table>
<thead>
<tr>
    <th>Nome</th>
    <th>Categoria</th>
    <th>Estoque Atual</th>
    <th>Unidade</th>
    <th>Validade</th>
    <th>Ações</th>
</tr>
</thead>
<tbody id="listaInsumos"></tbody>
</table>

</div>

<script src="js/app.js"></script>

<script>
// BLOQUEIO — PERMISSÕES QUE PODEM ACESSAR INSUMOS
const user = usuarioLogado();
if (!user || !["usuario", "admin", "estoquista", "producao"].includes(user.permissao)) {
    alert("Acesso não permitido para sua permissão.");
    location.href = "inicio.html";
}

// ESCONDER ITENS DO MENU CONFORME PERMISSÃO
const permitidas = areasPermitidas();

if (!permitidas.includes("producao")) document.getElementById("menuProducao").style.display = "none";
if (!permitidas.includes("estoque")) document.getElementById("menuEstoque").style.display = "none";
if (!permitidas.includes("produtos")) document.getElementById("menuProdutos").style.display = "none";
if (!permitidas.includes("insumos")) document.getElementById("menuInsumos").style.display = "none";
if (!permitidas.includes("relatorios")) document.getElementById("menuRelatorios").style.display = "none";
if (!permitidas.includes("admin")) document.getElementById("menuAdmin").style.display = "none";

// BOTÃO DE ADICIONAR INSUMO — SOMENTE ADMIN E USUÁRIO
if (!["admin", "usuario"].includes(user.permissao)) {
    document.getElementById("btnAdd").style.display = "none";
}

// LISTAGEM DE INSUMOS
function carregarInsumos() {
    const insumos = listar("insumos");
    const tabela = document.getElementById("listaInsumos");
    tabela.innerHTML = "";

    if (insumos.length === 0) {
        tabela.innerHTML = `<tr><td colspan="6">Nenhum insumo cadastrado.</td></tr>`;
        return;
    }

    insumos.forEach(i => {
        tabela.innerHTML += `
        <tr>
            <td>${i.nome}</td>
            <td>${i.categoria}</td>
            <td>${i.estoqueAtual ?? 0}</td>
            <td>${i.unidade || "-"}</td>
            <td>${i.validade || "-"}</td>
            <td>
                <button class="btn-secondary" onclick="editar(${i.id})">Editar</button>
                <button class="btn-danger" onclick="excluirInsumo(${i.id})">Excluir</button>
            </td>
        </tr>`;
    });
}

function editar(id) {
    localStorage.setItem("editInsumo", id);
    location.href = "insumo_edit.html";
}

function excluirInsumo(id) {
    if (!confirm("Tem certeza que deseja excluir este insumo?")) return;

    remover("insumos", id);
    registrarLog("Excluiu insumo", "ID " + id);
    carregarInsumos();
}

carregarInsumos();
</script>

</body>
</html>
