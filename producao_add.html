<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Produção</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="main">
<h2>Registrar Produção</h2>

<label>Produto</label>
<select id="produto"></select>

<label>Quantidade produzida</label>
<input id="quantidade" type="number" min="1">

<button class="btn-primary" onclick="salvar()">Registrar</button>
<button class="btn-secondary" onclick="history.back()">Cancelar</button>

</div>

<script src="js/app.js"></script>

<script>
// BLOQUEIO — SOMENTE PRODUÇÃO OU ADMIN
const user = usuarioLogado();
if (!user || (user.permissao !== "producao" && user.permissao !== "admin")) {
    alert("Acesso não permitido para sua permissão.");
    location.href = "inicio.html";
}

// CARREGAR PRODUTOS NO SELECT
window.onload = () => {
    const produtos = listar("produtos");
    const select = document.getElementById("produto");

    produtos.forEach(p => {
        select.innerHTML += `<option value="${p.id}">${p.nome}</option>`;
    });
};

// SALVAR PRODUÇÃO
function salvar() {
    const idProduto = Number(document.getElementById("produto").value);
    const qtd = Number(document.getElementById("quantidade").value);

    if (!idProduto) {
        alert("Selecione um produto.");
        return;
    }

    if (!qtd || qtd <= 0) {
        alert("Informe uma quantidade válida.");
        return;
    }

    // ATUALIZA ESTOQUE DO PRODUTO
    const produtos = listar("produtos");
    const prod = produtos.find(p => p.id === idProduto);

    if (!prod) {
        alert("Produto não encontrado.");
        return;
    }

    prod.estoqueAtual = (prod.estoqueAtual ?? 0) + qtd;
    salvar("produtos", produtos);

    // REGISTRA PRODUÇÃO
    adicionar("producao", {
        id: Date.now(),
        idProduto: idProduto,
        produto: prod.nome,
        quantidade: qtd,
        data: new Date().toLocaleString("pt-BR")
    });

    registrarLog("Produção registrada", `${prod.nome} — ${qtd} unidades`);

    alert("Produção registrada com sucesso!");
    location.href = "producao.html";
}
</script>

</body>
</html>
