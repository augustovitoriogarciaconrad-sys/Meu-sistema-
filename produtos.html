<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar">
    <div class="item" onclick="location.href='inicio.html'"><img class="icon" src="icons/home.svg"><span>Início</span></div>
    <div class="item" id="menuProducao" onclick="location.href='producao.html'"><img class="icon" src="icons/box.svg"><span>Produção</span></div>
    <div class="item" id="menuEstoque" onclick="location.href='estoque_produtos.html'"><img class="icon" src="icons/warehouse.svg"><span>Estoque</span></div>
    <div class="item active" id="menuProdutos" onclick="location.href='produtos.html'"><img class="icon" src="icons/tag.svg"><span>Produtos</span></div>
    <div class="item" id="menuInsumos" onclick="location.href='insumos.html'"><img class="icon" src="icons/layers.svg"><span>Insumos</span></div>
    <div class="item" id="menuRelatorios" onclick="location.href='relatorios.html'"><img class="icon" src="icons/chart.svg"><span>Relatórios</span></div>
    <div class="item" id="menuAdmin" onclick="location.href='admin.html'"><img class="icon" src="icons/settings.svg"><span>Administração</span></div>
    <div class="item" onclick="location.href='perfil.html'"><img class="icon" src="icons/user.svg"><span>Perfil</span></div>
    <div class="item" onclick="logout()"><img class="icon" src="icons/logout.svg"><span>Sair</span></div>
</div>

<div class="main">
<header>
    <h2>Produtos</h2>
</header>

<button class="btn-primary" onclick="location.href='produto_add.html'">Adicionar Produto</button>

<table>
<thead>
<tr>
    <th>Nome</th>
    <th>Categoria</th>
    <th>Preço</th>
    <th>Estoque Mínimo</th>
    <th>Ficha Técnica</th>
    <th>Ações</th>
</tr>
</thead>
<tbody id="listaProdutos"></tbody>
</table>

</div>

<script src="js/app.js"></script>

<script>
const user = usuarioLogado();
if (!user) {
    alert("Você precisa estar logado.");
    location.href = "index.html";
}

const permitidas = areasPermitidas();
if (!permitidas.includes("producao")) document.getElementById("menuProducao").style.display = "none";
if (!permitidas.includes("estoque")) document.getElementById("menuEstoque").style.display = "none";
if (!permitidas.includes("produtos")) document.getElementById("menuProdutos").style.display = "none";
if (!permitidas.includes("insumos")) document.getElementById("menuInsumos").style.display = "none";
if (!permitidas.includes("relatorios")) document.getElementById("menuRelatorios").style.display = "none";
if (!permitidas.includes("admin")) document.getElementById("menuAdmin").style.display = "none";

function carregarProdutos() {
    const produtos = listar("produtos");
    const tabela = document.getElementById("listaProdutos");
    tabela.innerHTML = "";

    if (produtos.length === 0) {
        tabela.innerHTML = `<tr><td colspan="6">Nenhum produto cadastrado.</td></tr>`;
        return;
    }

    produtos.forEach(p => {
        const temFicha = p.fichaTecnica && p.fichaTecnica.length > 0;

        tabela.innerHTML += `
        <tr>
            <td>${p.nome}</td>
            <td>${p.categoria}</td>
            <td>R$ ${Number(p.preco).toFixed(2)}</td>
            <td>${p.estoqueMinimo}</td>
            <td>${temFicha ? "✔️ Sim" : "❌ Não"}</td>
            <td>
                <button class="btn-small" onclick="editar(${p.id})">Editar</button>
                <button class="btn-small" onclick="editarFicha(${p.id})">Ficha Técnica</button>
                <button class="btn-small btn-danger" onclick="excluir(${p.id})">Excluir</button>
            </td>
        </tr>`;
    });
}

function editar(id) {
    location.href = "produtos_edit.html?id=" + id;
}

function editarFicha(id) {
    location.href = "produtos_edit.html?id=" + id;
}

function excluir(id) {
    if (!confirm("Tem certeza que deseja excluir este produto?")) return;

    let produtos = listar("produtos");
    produtos = produtos.filter(p => p.id !== id);
    salvar("produtos", produtos);

    alert("Produto excluído!");
    carregarProdutos();
}

carregarProdutos();
</script>

</body>
</html>
