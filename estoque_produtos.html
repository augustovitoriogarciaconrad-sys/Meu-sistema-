    <title>Estoque de Produtos</title>
    <link rel="stylesheet" href="css/style.css">

    <style>
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1A1A1A;
            padding: 25px;
            width: 350px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="item" onclick="location.href='inicio.html'"><img class="icon" src="icons/home.svg"><span>Início</span></div>
    <div class="item" id="menuProducao" onclick="location.href='producao.html'"><img class="icon" src="icons/box.svg"><span>Produção</span></div>
    <div class="item active" id="menuEstoque" onclick="location.href='estoque_produtos.html'"><img class="icon" src="icons/warehouse.svg"><span>Estoque</span></div>
    <div class="item" id="menuProdutos" onclick="location.href='produtos.html'"><img class="icon" src="icons/tag.svg"><span>Produtos</span></div>
    <div class="item" id="menuInsumos" onclick="location.href='insumos.html'"><img class="icon" src="icons/layers.svg"><span>Insumos</span></div>
    <div class="item" id="menuRelatorios" onclick="location.href='relatorios.html'"><img class="icon" src="icons/chart.svg"><span>Relatórios</span></div>
    <div class="item" id="menuAdmin" onclick="location.href='admin.html'"><img class="icon" src="icons/settings.svg"><span>Administração</span></div>
    <div class="item" onclick="location.href='perfil.html'"><img class="icon" src="icons/user.svg"><span>Perfil</span></div>
    <div class="item" onclick="logout()"><img class="icon" src="icons/logout.svg"><span>Sair</span></div>
</div>

<div class="main">
<header>
    <h2>Estoque de Produtos</h2>
</header>

<table>
<thead>
<tr>
    <th>Produto</th>
    <th>Estoque Atual</th>
    <th>Estoque Mínimo</th>
    <th>Status</th>
    <th>Ações</th>
</tr>
</thead>
<tbody id="listaEstoque"></tbody>
</table>

</div>

<!-- MODAL DE SAÍDA -->
<div id="modalSaida" class="modal">
    <div class="modal-content">
        <h3>Registrar Saída</h3>

        <p><b>Produto:</b> <span id="saidaProdutoNome"></span></p>
        <p><b>Estoque atual:</b> <span id="saidaProdutoEstoque"></span></p>

        <label>Quantidade</label>
        <input id="saidaQtd" type="number" min="1">

        <label>Motivo</label>
        <select id="saidaMotivo">
            <option value="Venda">Venda</option>
            <option value="Perda">Perda</option>
            <option value="Doação">Doação</option>
            <option value="Ajuste de estoque">Ajuste de estoque</option>
        </select>

        <button class="btn-primary" onclick="confirmarSaida()">Confirmar</button>
        <button class="btn-secondary" onclick="fecharSaida()">Cancelar</button>
    </div>
</div>

<script src="js/app.js"></script>

    location.href = "inicio.html";
}
