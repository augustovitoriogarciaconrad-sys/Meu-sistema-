<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque de Produtos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar">
    <div class="item" onclick="location.href='home.html'"><img class="icon" src="icons/home.svg"><span>Dashboard</span></div>
    <div class="item" onclick="location.href='producao.html'"><img class="icon" src="icons/box.svg"><span>Produção</span></div>
    <div class="item active" onclick="location.href='estoque_produtos.html'"><img class="icon" src="icons/warehouse.svg"><span>Estoque</span></div>
    <div class="item" onclick="location.href='produtos.html'"><img class="icon" src="icons/tag.svg"><span>Produtos</span></div>
    <div class="item" onclick="location.href='insumos.html'"><img class="icon" src="icons/layers.svg"><span>Insumos</span></div>
    <div class="item" onclick="location.href='relatorios.html'"><img class="icon" src="icons/chart.svg"><span>Relatórios</span></div>
    <div class="item" onclick="location.href='admin.html'"><img class="icon" src="icons/settings.svg"><span>Administração</span></div>
    <div class="item" onclick="location.href='perfil.html'"><img class="icon" src="icons/user.svg"><span>Perfil</span></div>
    <div class="item" onclick="logout()"><img class="icon" src="icons/logout.svg"><span>Sair</span></div>
</div>

<div class="main">
<header>
    <h2>Estoque de Produtos</h2>
</header>

<table>
<thead>
<tr>
    <th>Produto</th>
    <th>Produzido</th>
    <th>Estoque Mínimo</th>
    <th>Status</th>
</tr>
</thead>
<tbody id="listaEstoque"></tbody>
</table>

</div>

<script src="js/app.js"></script>
<script>
function carregarEstoque() {
    const produtos = listar("produtos");
    const producao = listar("producao");

    const tabela = document.getElementById("listaEstoque");
    tabela.innerHTML = "";

    produtos.forEach(p => {
        const total = producao
            .filter(x => x.produtoId == p.id)
            .reduce((s, x) => s + Number(x.quantidade), 0);

        let status = "";
        if (total <= 0) status = "<span class='status-critical'>Sem estoque</span>";
        else if (total < p.estoqueMinimo) status = "<span class='status-warn'>Abaixo do mínimo</span>";
        else status = "<span class='status-ok'>OK</span>";

        tabela.innerHTML += `
        <tr>
            <td>${p.nome}</td>
            <td>${total}</td>
            <td>${p.estoqueMinimo}</td>
            <td>${status}</td>
        </tr>`;
    });
}

carregarEstoque();
</script>

</body>
</html>
