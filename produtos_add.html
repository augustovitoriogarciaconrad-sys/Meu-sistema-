<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Produto</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="main">
<h2>Novo Produto</h2>

<label>Nome</label>
<input id="nome">

<label>Categoria</label>
<input id="categoria">

<label>Preço</label>
<input id="preco" type="number" min="0" step="0.01">

<label>Estoque Mínimo</label>
<input id="estoqueMinimo" type="number" min="0">

<button class="btn-primary" onclick="salvarProduto()">Salvar</button>
<button class="btn-secondary" onclick="history.back()">Cancelar</button>

</div>

<script src="js/app.js"></script>

<script>
// SALVAR PRODUTO
function salvarProduto() {

    const nomeProduto = document.getElementById("nome").value.trim();
    const categoriaProduto = document.getElementById("categoria").value.trim();
    const precoProduto = Number(document.getElementById("preco").value);
    const estoqueMin = Number(document.getElementById("estoqueMinimo").value);

    // VALIDAÇÃO
    if (!nomeProduto) {
        alert("Digite o nome do produto.");
        return;
    }

    if (!categoriaProduto) {
        alert("Digite a categoria do produto.");
        return;
    }

    if (isNaN(precoProduto) || precoProduto < 0) {
        alert("Informe um preço válido.");
        return;
    }

    if (isNaN(estoqueMin) || estoqueMin < 0) {
        alert("Informe um estoque mínimo válido.");
        return;
    }

    // IMPEDIR PRODUTOS DUPLICADOS
    const produtos = listar("produtos");
    if (produtos.some(p => p.nome.toLowerCase() === nomeProduto.toLowerCase())) {
        alert("Já existe um produto com esse nome.");
        return;
    }

    // CRIAR PRODUTO (com ficha técnica vazia)
    criarProduto(
        nomeProduto,
        categoriaProduto,
        precoProduto,
        estoqueMin,
        [] // ficha técnica vazia
    );

    // LOG
    const user = usuarioLogado();
    registrarLog(
        "Criou produto",
        `${user.nome} criou o produto ${nomeProduto}`
    );

    alert("Produto cadastrado com sucesso!");
    location.href = "produtos.html";
}
</script>

</body>
</html>
