<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Usuário</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="main">
<h2>Novo Usuário</h2>

<label>Nome</label>
<input id="nome">

<label>E-mail</label>
<input id="email">

<label>Senha</label>
<input id="senha" type="password">

<label>Permissão</label>
<select id="permissao">
    <option value="admin">Administrador</option>
    <option value="usuario">Usuário</option>
    <option value="financeiro">Financeiro</option>
    <option value="producao">Produção</option>
    <option value="estoquista">Estoquista</option>
</select>

<button class="btn-primary" onclick="salvar()">Salvar</button>
<button class="btn-secondary" onclick="history.back()">Cancelar</button>

</div>

<script src="js/app.js"></script>
<script>
function salvar() {
    const nome = document.getElementById("nome").value;
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;
    const permissao = document.getElementById("permissao").value;

    if (criarUsuario(nome, email, senha, permissao)) {
        alert("Usuário cadastrado com sucesso!");
        location.href = "admin.html";
    }
}
</script>

</body>
</html>
