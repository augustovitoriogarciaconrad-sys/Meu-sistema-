<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Usuário</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="main">
<h2>Novo Usuário</h2>

<label>Nome</label>
<input id="nome">

<label>E-mail</label>
<input id="email" type="email">

<label>Senha</label>
<input id="senha" type="password">

<label>Permissão</label>
<select id="permissao">
    <option value="admin">Administrador</option>
    <option value="usuario">Usuário</option>
    <option value="financeiro">Financeiro</option>
    <option value="producao">Produção</option>
    <option value="estoquista">Estoquista</option>
</select>

<button class="btn-primary" onclick="salvarUsuario()">Salvar</button>
<button class="btn-secondary" onclick="history.back()">Cancelar</button>

</div>

<script src="js/app.js"></script>

<script>
// BLOQUEIO — SOMENTE ADMIN
const user = usuarioLogado();
if (!user || user.permissao !== "admin") {
    alert("Apenas administradores podem acessar esta área.");
    location.href = "inicio.html";
}

// LIMPA POSSÍVEL ID DE EDIÇÃO
localStorage.removeItem("editUsuario");

// SALVAR USUÁRIO
function salvarUsuario() {
    const nomeIn = nome.value.trim();
    const emailIn = email.value.trim();
    const senhaIn = senha.value.trim();
    const permissaoIn = permissao.value;

    if (!nomeIn || !emailIn || !senhaIn) {
        alert("Preencha todos os campos.");
        return;
    }

    const usuarios = listar("usuarios");
    if (usuarios.some(u => u.email === emailIn)) {
        alert("Já existe um usuário cadastrado com este e-mail.");
        return;
    }

    adicionar("usuarios", {
        nome: nomeIn,
        email: emailIn,
        senha: senhaIn,
        permissao: permissaoIn
    });

    registrarLog("Criou usuário", emailIn);
    alert("Usuário cadastrado com sucesso!");
    location.href = "admin.html";
}
</script>

</body>
</html>
