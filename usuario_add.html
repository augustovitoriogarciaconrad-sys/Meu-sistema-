<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Usuário</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="main">
<h2>Novo Usuário</h2>

<label>Nome</label>
<input id="nome">

<label>E-mail</label>
<input id="email" type="email">

<label>Senha</label>
<input id="senha" type="password">

<label>Permissão</label>
<select id="permissao">
    <option value="admin">Administrador</option>
    <option value="usuario">Usuário</option>
    <option value="financeiro">Financeiro</option>
    <option value="producao">Produção</option>
    <option value="estoquista">Estoquista</option>
</select>

<button class="btn-primary" onclick="salvarUsuario()">Salvar</button>
<button class="btn-secondary" onclick="history.back()">Cancelar</button>

</div>

<script src="js/app.js"></script>

<script>
// BLOQUEIO — SOMENTE ADMIN PODE ACESSAR ESTA PÁGINA
const user = usuarioLogado();
if (!user || user.permissao !== "admin") {
    alert("Apenas administradores podem acessar esta área.");
    location.href = "inicio.html";
}

// SALVAR USUÁRIO
function salvarUsuario() {
    const nome = nomeInput.value.trim();
    const email = emailInput.value.trim();
    const senha = senhaInput.value.trim();
    const permissao = permissaoInput.value;

    // Validação
    if (!nome || !email || !senha) {
        alert("Preencha todos os campos.");
        return;
    }

    // Impede duplicar e-mail
    const usuarios = listar("usuarios");
    if (usuarios.some(u => u.email === email)) {
        alert("Já existe um usuário cadastrado com este e-mail.");
        return;
    }

    // Criação
    if (criarUsuario(nome, email, senha, permissao)) {
        registrarLog("Criou usuário", nome);
        alert("Usuário cadastrado com sucesso!");
        location.href = "admin.html";
    }
}

// Inputs
const nomeInput = document.getElementById("nome");
const emailInput = document.getElementById("email");
const senhaInput = document.getElementById("senha");
const permissaoInput = document.getElementById("permissao");
</script>

</body>
</html>
