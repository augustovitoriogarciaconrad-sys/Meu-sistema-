<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar">
    <div class="item" onclick="location.href='inicio.html'"><img class="icon" src="icons/home.svg"><span>Início</span></div>
    <div class="item" id="menuProducao" onclick="location.href='producao.html'"><img class="icon" src="icons/box.svg"><span>Produção</span></div>
    <div class="item" id="menuEstoque" onclick="location.href='estoque_produtos.html'"><img class="icon" src="icons/warehouse.svg"><span>Estoque</span></div>
    <div class="item" id="menuProdutos" onclick="location.href='produtos.html'"><img class="icon" src="icons/tag.svg"><span>Produtos</span></div>
    <div class="item" id="menuInsumos" onclick="location.href='insumos.html'"><img class="icon" src="icons/layers.svg"><span>Insumos</span></div>
    <div class="item" id="menuRelatorios" onclick="location.href='relatorios.html'"><img class="icon" src="icons/chart.svg"><span>Relatórios</span></div>

    <div class="item active" id="menuAdmin" onclick="location.href='admin.html'">
        <img class="icon" src="icons/settings.svg"><span>Administração</span>
    </div>

    <div class="item" onclick="location.href='perfil.html'"><img class="icon" src="icons/user.svg"><span>Perfil</span></div>
    <div class="item" onclick="logout()"><img class="icon" src="icons/logout.svg"><span>Sair</span></div>
</div>

<div class="main">
<header>
    <h2>Administração</h2>
    <button class="btn-primary" onclick="location.href='usuario_add.html'">+ Adicionar Usuário</button>
</header>

<h3>Usuários do Sistema</h3>
<table>
<thead>
<tr>
    <th>Nome</th>
    <th>E-mail</th>
    <th>Permissão</th>
    <th>Ações</th>
</tr>
</thead>
<tbody id="listaUsuarios"></tbody>
</table>

<h3 style="margin-top:40px;">Logs do Sistema</h3>
<table>
<thead>
<tr>
    <th>Usuário</th>
    <th>Ação</th>
    <th>Detalhes</th>
    <th>Data</th>
</tr>
</thead>
<tbody id="listaLogs"></tbody>
</table>

</div>

<script src="js/app.js"></script>

<script>
// BLOQUEIO — SOMENTE ADMIN
const user = usuarioLogado();
if (!user || user.permissao !== "admin") {
    alert("Apenas administradores podem acessar esta área.");
    location.href = "inicio.html";
}

// MENU DINÂMICO
const permitidas = areasPermitidas();
if (!permitidas.includes("producao")) document.getElementById("menuProducao").style.display = "none";
if (!permitidas.includes("estoque")) document.getElementById("menuEstoque").style.display = "none";
if (!permitidas.includes("produtos")) document.getElementById("menuProdutos").style.display = "none";
if (!permitidas.includes("insumos")) document.getElementById("menuInsumos").style.display = "none";
if (!permitidas.includes("relatorios")) document.getElementById("menuRelatorios").style.display = "none";
if (!permitidas.includes("admin")) document.getElementById("menuAdmin").style.display = "none";

// LISTA DE USUÁRIOS
function carregarUsuarios() {
    let usuarios = listar("usuarios");
    usuarios.sort((a, b) => a.nome.localeCompare(b.nome));

    const tabela = document.getElementById("listaUsuarios");
    tabela.innerHTML = "";

    if (usuarios.length === 0) {
        tabela.innerHTML = `<tr><td colspan="4">Nenhum usuário cadastrado.</td></tr>`;
        return;
    }

    usuarios.forEach(u => {
        tabela.innerHTML += `
        <tr>
            <td>${u.nome}</td>
            <td>${u.email}</td>
            <td>${u.permissao}</td>
            <td>
                <button class="btn-secondary" onclick="editar(${u.id})">Editar</button>
                <button class="btn-danger" onclick="excluirUsuario(${u.id})">Excluir</button>
            </td>
        </tr>`;
    });
}

function editar(id) {
    localStorage.setItem("editUsuario", id);
    location.href = "usuario_edit.html";
}

function excluirUsuario(id) {
    const usuarios = listar("usuarios");
    const alvo = usuarios.find(u => u.id == id);

    if (!alvo) return;

    if (alvo.email === "admin@admin.com") {
        alert("O administrador padrão não pode ser excluído.");
        return;
    }

    if (user.id == id) {
        alert("Você não pode excluir a si mesmo enquanto estiver logado.");
        return;
    }

    if (!confirm(`Excluir usuário "${alvo.nome}"?`)) return;

    remover("usuarios", id);
    registrarLog("Excluiu usuário", alvo.email);
    carregarUsuarios();
}

// LISTA DE LOGS
function carregarLogs() {
    const logs = listar("logs");
    const tabela = document.getElementById("listaLogs");
    tabela.innerHTML = "";

    logs.slice(-30).reverse().forEach(l => {
        tabela.innerHTML += `
        <tr>
            <td>${l.usuario}</td>
            <td>${l.acao}</td>
            <td>${l.detalhes}</td>
            <td>${l.data}</td>
        </tr>`;
    });
}

carregarUsuarios();
carregarLogs();
</script>

</body>
</html>
