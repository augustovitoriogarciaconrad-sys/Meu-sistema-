<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar">
    <div class="item" onclick="location.href='inicio.html'"><img class="icon" src="icons/home.svg"><span>Início</span></div>
    <div class="item" id="menuProducao" onclick="location.href='producao.html'"><img class="icon" src="icons/box.svg"><span>Produção</span></div>
    <div class="item" id="menuEstoque" onclick="location.href='estoque_produtos.html'"><img class="icon" src="icons/warehouse.svg"><span>Estoque</span></div>
    <div class="item" id="menuProdutos" onclick="location.href='produtos.html'"><img class="icon" src="icons/tag.svg"><span>Produtos</span></div>
    <div class="item" id="menuInsumos" onclick="location.href='insumos.html'"><img class="icon" src="icons/layers.svg"><span>Insumos</span></div>
    <div class="item" id="menuRelatorios" onclick="location.href='relatorios.html'"><img class="icon" src="icons/chart.svg"><span>Relatórios</span></div>

    <div class="item active" id="menuAdmin" onclick="location.href='admin.html'">
        <img class="icon" src="icons/settings.svg"><span>Administração</span>
    </div>

    <div class="item" onclick="location.href='perfil.html'"><img class="icon" src="icons/user.svg"><span>Perfil</span></div>
    <div class="item" onclick="logout()"><img class="icon" src="icons/logout.svg"><span>Sair</span></div>
</div>

<div class="main">
<header>
    <h2>Administração</h2>
    <button class="btn-primary" onclick="location.href='usuario_add.html'">+ Adicionar Usuário</button>
</header>

<h3>Usuários do Sistema</h3>
<table>
<thead>
<tr>
    <th>Nome</th>
    <th>E-mail</th>
    <th>Permissão</th>
    <th>Ações</th>
</tr>
</thead>
<tbody id="listaUsuarios"></tbody>
</table>

<h3 style="margin-top:40px;">Logs do Sistema</h3>
<table>
<thead>
<tr>
    <th>Usuário</th>
    <th>Ação</th>
    <th>Detalhes</th>
    <th>Data</th>
</tr>
</thead>
<tbody id="listaLogs"></tbody>
</table>

<h3 style="margin-top:40px;">Histórico de Retiradas de Insumos</h3>

<!-- FILTROS -->
<div style="display:flex; gap:20px; margin-bottom:20px; flex-wrap:wrap;">

    <div>
        <label>Filtrar por Usuário</label>
        <select id="filtroUsuario">
            <option value="">Todos</option>
        </select>
    </div>

    <div>
        <label>Filtrar por Insumo</label>
        <select id="filtroInsumo">
            <option value="">Todos</option>
        </select>
    </div>

    <div>
        <label>Data Inicial</label>
        <input type="date" id="filtroDataIni">
    </div>

    <div>
        <label>Data Final</label>
        <input type="date" id="filtroDataFim">
    </div>

    <div style="align-self:flex-end;">
        <button class="btn-primary" onclick="carregarRetiradas()">Aplicar Filtros</button>
    </div>

</div>

<table>
<thead>
<tr>
    <th>Usuário</th>
    <th>Insumo</th>
    <th>Quantidade</th>
    <th>Data</th>
</tr>
</thead>
<tbody id="listaRetiradas"></tbody>
</table>

</div>

<script src="js/app.js"></script>

<script>
// BLOQUEIO — SOMENTE ADMIN
const user = usuarioLogado();
if (!user || user.permissao !== "admin") {
    alert("Apenas administradores podem acessar esta área.");
    location.href = "inicio.html";
}

// MENU DINÂMICO
const permitidas = areasPermitidas();
if (!permitidas.includes("producao")) document.getElementById("menuProducao").style.display = "none";
if (!permitidas.includes("estoque")) document.getElementById("menuEstoque").style.display = "none";
if (!permitidas.includes("produtos")) document.getElementById("menuProdutos").style.display = "none";
if (!permitidas.includes("insumos")) document.getElementById("menuInsumos").style.display = "none";
if (!permitidas.includes("relatorios")) document.getElementById("menuRelatorios").style.display = "none";
if (!permitidas.includes("admin")) document.getElementById("menuAdmin").style.display = "none";

// LISTA DE USUÁRIOS
function carregarUsuarios() {
    let usuarios = listar("usuarios");
    usuarios.sort((a, b) => a.nome.localeCompare(b.nome));

    const tabela = document.getElementById("listaUsuarios");
    tabela.innerHTML = "";

    if (usuarios.length === 0) {
        tabela.innerHTML = `<tr><td colspan="4">Nenhum usuário cadastrado.</td></tr>`;
        return;
    }

    usuarios.forEach(u => {
        tabela.innerHTML += `
        <tr>
            <td>${u.nome}</td>
            <td>${u.email}</td>
            <td>${u.permissao}</td>
            <td>
                <button class="btn-secondary" onclick="editar(${u.id})">Editar</button>
                <button class="btn-danger" onclick="excluirUsuario(${u.id})">Excluir</button>
            </td>
        </tr>`;
    });
}

function editar(id) {
    localStorage.setItem("editUsuario", id);
    location.href = "usuario_edit.html";
}

function excluirUsuario(id) {
    const usuarios = listar("usuarios");
    const alvo = usuarios.find(u => u.id == id);

    if (!alvo) return;

    if (alvo.email === "admin@admin.com") {
        alert("O administrador padrão não pode ser excluído.");
        return;
    }

    if (user.id == id) {
        alert("Você não pode excluir a si mesmo enquanto estiver logado.");
        return;
    }

    if (!confirm(`Excluir usuário "${alvo.nome}"?`)) return;

    remover("usuarios", id);
    registrarLog("Excluiu usuário", alvo.email);
    carregarUsuarios();
}

// LISTA DE LOGS
function carregarLogs() {
    const logs = listar("logs");
    const tabela = document.getElementById("listaLogs");
    tabela.innerHTML = "";

    logs.slice(-30).reverse().forEach(l => {
        tabela.innerHTML += `
        <tr>
            <td>${l.usuario}</td>
            <td>${l.acao}</td>
            <td>${l.detalhes}</td>
            <td>${l.data}</td>
        </tr>`;
    });
}

// LISTA DE RETIRADAS DE INSUMOS (COM FILTROS)
function carregarRetiradas() {
    const logs = listar("logs");
    const tabela = document.getElementById("listaRetiradas");
    tabela.innerHTML = "";

    const filtroUsuario = document.getElementById("filtroUsuario").value;
    const filtroInsumo = document.getElementById("filtroInsumo").value;
    const dataIni = document.getElementById("filtroDataIni").value;
    const dataFim = document.getElementById("filtroDataFim").value;

    let retiradas = logs.filter(l => l.acao === "Retirou insumo");

    if (filtroUsuario) retiradas = retiradas.filter(r => r.usuario === filtroUsuario);
    if (filtroInsumo) retiradas = retiradas.filter(r => r.detalhes.startsWith(filtroInsumo));
    if (dataIni) retiradas = retiradas.filter(r => new Date(r.data) >= new Date(dataIni));
    if (dataFim) retiradas = retiradas.filter(r => new Date(r.data) <= new Date(dataFim + " 23:59:59"));

    if (retiradas.length === 0) {
        tabela.innerHTML = `<tr><td colspan="4">Nenhuma retirada encontrada.</td></tr>`;
        return;
    }

    retiradas.reverse().forEach(r => {
        const partes = r.detalhes.split(" — ");
        const nomeInsumo = partes[0];
        const quantidade = partes[1];

        tabela.innerHTML += `
        <tr>
            <td>${r.usuario}</td>
            <td>${nomeInsumo}</td>
            <td>${quantidade}</td>
            <td>${r.data}</td>
        </tr>`;
    });
}

// PREENCHE OS SELECTS DOS FILTROS
function preencherFiltrosRetiradas() {
    const logs = listar("logs");

    const usuarios = new Set();
    const insumos = new Set();

    logs.forEach(l => {
        if (l.acao === "Retirou insumo") {
            usuarios.add(l.usuario);
            insumos.add(l.detalhes.split(" — ")[0]);
        }
    });

    const selUsuario = document.getElementById("filtroUsuario");
    const selInsumo = document.getElementById("filtroInsumo");

    usuarios.forEach(u => selUsuario.innerHTML += `<option value="${u}">${u}</option>`);
    insumos.forEach(i => selInsumo.innerHTML += `<option value="${i}">${i}</option>`);
}

carregarUsuarios();
carregarLogs();
preencherFiltrosRetiradas();
carregarRetiradas();
</script>

</body>
</html>
