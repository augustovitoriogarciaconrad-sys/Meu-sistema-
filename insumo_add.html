<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Insumo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="main">
<h2>Novo Insumo</h2>

<label>Nome</label>
<input id="nome">

<label>Categoria</label>
<input id="categoria">

<label>Quantidade inicial</label>
<input id="quantidade" type="number" min="0" step="0.001">

<label>Unidade</label>
<select id="unidade">
    <option value="un">Unidade (un)</option>
    <option value="kg">Quilo (kg)</option>
    <option value="g">Gramas (g)</option>
    <option value="L">Litro (L)</option>
    <option value="ml">Mililitro (ml)</option>
</select>

<label>Validade</label>
<input id="validade" type="date">

<button class="btn-primary" onclick="salvarInsumo()">Salvar</button>
<button class="btn-secondary" onclick="history.back()">Cancelar</button>

</div>

<script src="js/app.js"></script>

<script>
// BLOQUEIO — SOMENTE ADMIN E USUÁRIO PODEM CADASTRAR INSUMOS
const user = usuarioLogado();
if (!user || !["admin", "usuario"].includes(user.permissao)) {
    alert("Acesso não permitido para sua permissão.");
    location.href = "inicio.html";
}

// SALVAR INSUMO
function salvarInsumo() {
    const nomeInsumo = nome.value.trim();
    const categoriaInsumo = categoria.value.trim();
    const qtd = Number(quantidade.value);
    const unidadeInsumo = unidade.value;
    const validadeInsumo = validade.value;

    if (!nomeInsumo || !categoriaInsumo || !validadeInsumo) {
        alert("Preencha todos os campos.");
        return;
    }

    if (isNaN(qtd) || qtd < 0) {
        alert("Informe uma quantidade válida.");
        return;
    }

    criarInsumo(nomeInsumo, categoriaInsumo, qtd, validadeInsumo, unidadeInsumo);
    registrarLog("Criou insumo", nomeInsumo);

    alert("Insumo cadastrado com sucesso!");
    location.href = "insumos.html";
}
</script>

</body>
</html>
