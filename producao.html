<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produção</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar">
    <div class="item" onclick="location.href='home.html'"><img class="icon" src="icons/home.svg"><span>Dashboard</span></div>
    <div class="item active" onclick="location.href='producao.html'"><img class="icon" src="icons/box.svg"><span>Produção</span></div>
    <div class="item" onclick="location.href='estoque_produtos.html'"><img class="icon" src="icons/warehouse.svg"><span>Estoque</span></div>
    <div class="item" onclick="location.href='produtos.html'"><img class="icon" src="icons/tag.svg"><span>Produtos</span></div>
    <div class="item" onclick="location.href='insumos.html'"><img class="icon" src="icons/layers.svg"><span>Insumos</span></div>
    <div class="item" onclick="location.href='relatorios.html'"><img class="icon" src="icons/chart.svg"><span>Relatórios</span></div>
    <div class="item" onclick="location.href='admin.html'"><img class="icon" src="icons/settings.svg"><span>Administração</span></div>
    <div class="item" onclick="location.href='perfil.html'"><img class="icon" src="icons/user.svg"><span>Perfil</span></div>
    <div class="item" onclick="logout()"><img class="icon" src="icons/logout.svg"><span>Sair</span></div>
</div>

<div class="main">
<header>
    <h2>Produção</h2>
    <button class="btn-primary" onclick="location.href='producao_add.html'">+ Registrar Produção</button>
</header>

<table>
<thead>
<tr>
    <th>Produto</th>
    <th>Quantidade</th>
    <th>Custo</th>
    <th>Data</th>
    <th>Ações</th>
</tr>
</thead>
<tbody id="listaProducao"></tbody>
</table>

</div>

<script src="js/app.js"></script>
<script>
function carregarProducao() {
    const producao = listar("producao");
    const produtos = listar("produtos");
    const tabela = document.getElementById("listaProducao");

    tabela.innerHTML = "";

    producao.forEach(p => {
        const prod = produtos.find(x => x.id == p.produtoId);

        tabela.innerHTML += `
        <tr>
            <td>${prod ? prod.nome : "Produto removido"}</td>
            <td>${p.quantidade}</td>
            <td>R$ ${Number(p.custo).toFixed(2)}</td>
            <td>${p.data}</td>
            <td>
                <button class="btn-danger" onclick="excluirProducao(${p.id})">Excluir</button>
            </td>
        </tr>`;
    });
}

function excluirProducao(id) {
    remover("producao", id);
    registrarLog("Excluiu produção", "ID " + id);
    carregarProducao();
}

carregarProducao();
</script>

</body>
</html>
