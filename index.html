<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quitanda Multiétnica</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display:flex;justify-content:center;align-items:center;height:100vh;background:#0F0F0F;">

<div style="width:350px;background:#1A1A1A;padding:30px;border:1px solid #2C2C2C;">
    <h2 style="margin:0 0 20px 0;text-align:center;">Quitanda Multiétnica</h2>

    <label>E-mail</label>
    <input id="email" type="email">

    <label>Senha</label>
    <input id="senha" type="password">

    <button class="btn-primary" style="width:100%;margin-top:20px;" onclick="fazerLogin()">Entrar</button>
</div>

<script src="js/app.js"></script>
<script>
async function fazerLogin() {
    const ok = await login(email.value, senha.value);
    if (!ok) return alert("Credenciais inválidas.");
    window.location.href = "home.html";
}
</script>

</body>
</html>
