<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quitanda Multiétnica</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display:flex;justify-content:center;align-items:center;height:100vh;background:#0F0F0F;">

<div style="width:350px;background:#1A1A1A;padding:30px;border:1px solid #2C2C2C;">
    <h2 style="margin:0 0 20px 0;text-align:center;">Quitanda Multiétnica</h2>

    <label>E-mail</label>
    <input id="email" type="email">

    <label>Senha</label>
    <input id="senha" type="password">

    <button class="btn-primary" style="width:100%;margin-top:20px;" onclick="fazerLogin()">Entrar</button>

    <div id="msg" style="margin-top:15px;"></div>
</div>

<script src="js/app.js"></script>

<script>
function fazerLogin() {
    const emailDigitado = email.value.trim();
    const senhaDigitada = senha.value.trim();

    if (!emailDigitado || !senhaDigitada) {
        msg.innerHTML = "<div class='alert alert-warning'>Preencha todos os campos.</div>";
        return;
    }

    const autenticado = login(emailDigitado, senhaDigitada);

    if (!autenticado) {
        msg.innerHTML = "<div class='alert alert-danger'>Credenciais inválidas.</div>";
        return;
    }

    window.location.href = "inicio.html";
}
</script>

</body>
</html>
