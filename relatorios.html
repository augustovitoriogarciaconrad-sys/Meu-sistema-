<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar">
    <div class="item" onclick="location.href='inicio.html'"><img class="icon" src="icons/home.svg"><span>Início</span></div>
    <div class="item" id="menuProducao" onclick="location.href='producao.html'"><img class="icon" src="icons/box.svg"><span>Produção</span></div>
    <div class="item" id="menuEstoque" onclick="location.href='estoque_produtos.html'"><img class="icon" src="icons/warehouse.svg"><span>Estoque</span></div>
    <div class="item" id="menuProdutos" onclick="location.href='produtos.html'"><img class="icon" src="icons/tag.svg"><span>Produtos</span></div>
    <div class="item" id="menuInsumos" onclick="location.href='insumos.html'"><img class="icon" src="icons/layers.svg"><span>Insumos</span></div>
    <div class="item active" id="menuRelatorios" onclick="location.href='relatorios.html'"><img class="icon" src="icons/chart.svg"><span>Relatórios</span></div>
    <div class="item" id="menuAdmin" onclick="location.href='admin.html'"><img class="icon" src="icons/settings.svg"><span>Administração</span></div>
    <div class="item" onclick="location.href='perfil.html'"><img class="icon" src="icons/user.svg"><span>Perfil</span></div>
    <div class="item" onclick="logout()"><img class="icon" src="icons/logout.svg"><span>Sair</span></div>
</div>

<div class="main">
<header>
    <h2>Relatórios</h2>
</header>

<h3>Produção por Produto</h3>
<table>
<thead>
<tr>
    <th>Produto</th>
    <th>Total Produzido</th>
    <th>Custo Total</th>
</tr>
</thead>
<tbody id="relProd"></tbody>
</table>

<h3 style="margin-top:40px;">Insumos Próximos do Vencimento</h3>
<table>
<thead>
<tr>
    <th>Insumo</th>
    <th>Categoria</th>
    <th>Validade</th>
    <th>Dias Restantes</th>
</tr>
</thead>
<tbody id="relVenc"></tbody>
</table>

<h3 style="margin-top:40px;">Últimas Ações do Sistema</h3>
<table>
<thead>
<tr>
    <th>Usuário</th>
    <th>Ação</th>
    <th>Detalhes</th>
    <th>Data</th>
</tr>
</thead>
<tbody id="relLogs"></tbody>
</table>

</div>

<script src="js/app.js"></script>

<script>
// BLOQUEIO — PERMISSÕES QUE PODEM ACESSAR RELATÓRIOS
const user = usuarioLogado();
if (!user || !["usuario", "financeiro", "admin", "estoquista", "producao"].includes(user.permissao)) {
    alert("Acesso não permitido para sua permissão.");
    location.href = "inicio.html";
}

// ESCONDER ITENS DO MENU CONFORME PERMISSÃO
const permitidas = areasPermitidas();

if (!permitidas.includes("producao")) document.getElementById("menuProducao").style.display = "none";
if (!permitidas.includes("estoque")) document.getElementById("menuEstoque").style.display = "none";
if (!permitidas.includes("produtos")) document.getElementById("menuProdutos").style.display = "none";
if (!permitidas.includes("insumos")) document.getElementById("menuInsumos").style.display = "none";
if (!permitidas.includes("relatorios")) document.getElementById("menuRelatorios").style.display = "none";
if (!permitidas.includes("admin")) document.getElementById("menuAdmin").style.display = "none";

// CARREGAR RELATÓRIOS
function carregarRelatorios() {
    const produtos = listar("produtos");
    const producao = listar("producao");
    const insumos = listar("insumos");
    const logs = listar("logs");

    // PRODUÇÃO POR PRODUTO
    const tabelaProd = document.getElementById("relProd");
    tabelaProd.innerHTML = "";

    produtos.forEach(p => {
        const prod = producao.filter(x => x.produtoId == p.id);
        const totalQtd = prod.reduce((s, x) => s + Number(x.quantidade), 0);
        const totalCusto = prod.reduce((s, x) => s + Number(x.custo), 0);

        tabelaProd.innerHTML += `
        <tr>
            <td>${p.nome}</td>
            <td>${totalQtd}</td>
            <td>R$ ${totalCusto.toFixed(2)}</td>
        </tr>`;
    });

    // INSUMOS PRÓXIMOS DO VENCIMENTO
    const tabelaVenc = document.getElementById("relVenc");
    tabelaVenc.innerHTML = "";

    const hoje = new Date();

    insumos.forEach(i => {
        if (!i.validade) return;

        const validade = new Date(i.validade);
        const diff = Math.ceil((validade - hoje) / (1000 * 60 * 60 * 24));

        if (diff <= 10 && diff >= 0) {
            tabelaVenc.innerHTML += `
            <tr>
                <td>${i.nome}</td>
                <td>${i.categoria}</td>
                <td>${i.validade}</td>
                <td>${diff} dias</td>
            </tr>`;
        }
    });

    // LOGS
    const tabelaLogs = document.getElementById("relLogs");
    tabelaLogs.innerHTML = "";

    logs.slice(-20).reverse().forEach(l => {
        tabelaLogs.innerHTML += `
        <tr>
            <td>${l.usuario}</td>
            <td>${l.acao}</td>
            <td>${l.detalhes}</td>
            <td>${l.data}</td>
        </tr>`;
    });
}

carregarRelatorios();
</script>

</body>
</html>
