<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuário</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="main">
<h2>Editar Usuário</h2>

<label>Nome</label>
<input id="nome">

<label>E-mail</label>
<input id="email" type="email">

<label>Senha</label>
<input id="senha" type="password">

<label>Permissão</label>
<select id="permissao">
    <option value="admin">Administrador</option>
    <option value="usuario">Usuário</option>
    <option value="financeiro">Financeiro</option>
    <option value="producao">Produção</option>
    <option value="estoquista">Estoquista</option>
</select>

<button class="btn-primary" onclick="salvarEdicao()">Salvar</button>
<button class="btn-secondary" onclick="history.back()">Cancelar</button>

</div>

<script src="js/app.js"></script>

<script>
// BLOQUEIO — SOMENTE ADMIN
const logado = usuarioLogado();
if (!logado || logado.permissao !== "admin") {
    alert("Apenas administradores podem acessar esta área.");
    location.href = "inicio.html";
}

// CARREGAR USUÁRIO
const id = localStorage.getItem("editUsuario");
let usuarios = listar("usuarios");
let user = usuarios.find(x => x.id == id);

if (!user) {
    alert("Usuário não encontrado.");
    location.href = "admin.html";
}

// Impede editar o admin padrão
if (user.email === "admin@admin.com") {
    alert("O usuário administrador padrão não pode ser editado.");
    location.href = "admin.html";
}

// Preenche os campos
nome.value = user.nome;
email.value = user.email;
senha.value = user.senha;
permissao.value = user.permissao;

// SALVAR ALTERAÇÕES
function salvarEdicao() {

    const nomeNovo = nome.value.trim();
    const emailNovo = email.value.trim();
    const senhaNova = senha.value.trim();
    const permissaoNova = permissao.value;

    if (!nomeNovo || !emailNovo || !senhaNova) {
        alert("Preencha todos os campos.");
        return;
    }

    // Impede duplicação de e-mail
    const existe = usuarios.some(u => u.email === emailNovo && u.id != user.id);
    if (existe) {
        alert("Já existe um usuário com este e-mail.");
        return;
    }

    // Atualiza dados
    user.nome = nomeNovo;
    user.email = emailNovo;
    user.senha = senhaNova;
    user.permissao = permissaoNova;

    atualizar("usuarios", user.id, user);
    registrarLog("Editou usuário", user.email);

    alert("Usuário atualizado com sucesso!");
    location.href = "admin.html";
}
</script>

</body>
</html>
