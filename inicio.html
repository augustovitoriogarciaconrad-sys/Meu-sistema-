<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início</title>
    <link rel="stylesheet" href="css/style.css">

    <style>
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: #1A1A1A;
            border: 1px solid #2C2C2C;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .card:hover {
            background: #222;
        }
    </style>
</head>
<body>

<div class="main">
    <h2>Bem-vindo ao Sistema</h2>
    <p>Selecione uma área disponível:</p>

    <div class="grid" id="areaContainer"></div>
</div>

<script src="js/app.js"></script>

<script>
const user = usuarioLogado();
const container = document.getElementById("areaContainer");

// Função para criar cards
function criarCard(nome, pagina) {
    const div = document.createElement("div");
    div.className = "card";
    div.innerText = nome;
    div.onclick = () => location.href = pagina;
    container.appendChild(div);
}

// Admin vê tudo
if (user.permissao === "admin") {
    criarCard("Produção", "producao.html");
    criarCard("Estoque", "estoque_produtos.html");
    criarCard("Produtos", "produtos.html");
    criarCard("Insumos", "insumos.html");
    criarCard("Relatórios", "relatorios.html");
    criarCard("Administração", "admin.html");
}

// Produção
if (user.permissao === "producao") {
    criarCard("Produção", "producao.html");
}

// Estoquista
if (user.permissao === "estoquista") {
    criarCard("Estoque", "estoque_produtos.html");
}

// Usuário comum
if (user.permissao === "usuario") {
    criarCard("Produtos", "produtos.html");
    criarCard("Insumos", "insumos.html");
    criarCard("Relatórios", "relatorios.html");
}

// Financeiro (se existir)
if (user.permissao === "financeiro") {
    criarCard("Relatórios", "relatorios.html");
}
</script>

</body>
</html>
